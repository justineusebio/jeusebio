  <script>
    // theme: dark by default; light via nav toggle, remembered across visits
    (function () {
      try { if (localStorage.getItem('theme') === 'light') document.documentElement.setAttribute('data-theme', 'light'); } catch (e) {}
      document.addEventListener('click', function (e) {
        var btn = e.target.closest ? e.target.closest('.theme-toggle') : null;
        if (!btn) return;
        var root = document.documentElement;
        var toLight = root.getAttribute('data-theme') !== 'light';
        if (toLight) root.setAttribute('data-theme', 'light'); else root.removeAttribute('data-theme');
        try { localStorage.setItem('theme', toLight ? 'light' : 'dark'); } catch (e) {}
      });
    })();
  </script>
